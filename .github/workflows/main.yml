name: CI/CD to VPS

on:
  push:
    branches: [ "main", "master" ] # Сработает при пуше в эти ветки

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64
          push: true
          # Используем твой образ, который мы проверили
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-fastapi-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Команды выполнятся на твоем сервере
            kubectl apply -f /root/CI-CD---VPS-Kubernetes-k3s-/k8s/deployment.yaml
            kubectl apply -f /root/CI-CD---VPS-Kubernetes-k3s-/k8s/service.yaml
            # Принудительно обновляем поды, чтобы они скачали новый образ
            kubectl rollout restart deployment lab1-api
